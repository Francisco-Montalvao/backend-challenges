name: CI - Validação de Estrutura e Soluções

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'solucoes/**'
      - 'junior/**'
      - 'pleno/**'
      - 'senior/**'
      - 'docs/**'
      - '.github/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'desafio.md'
      - 'CHANGELOG_README.md'

jobs:
  validate-structure:
    name: Validar estrutura e QUICKSTARTs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar estrutura dos desafios
        run: |
          set -e
          CHALLENGES=(
            "junior/crud/todo-list"
            "junior/autenticacao/login-jwt"
            "junior/crud/gerenciador-produtos"
            "junior/relatorios/vendas"
            "pleno/mensageria/fila-notificacoes"
            "senior/microsservicos/sistema-pedidos"
          )

          REQUIRED_FILES=("README.md" "QUICKSTART.md" "SOLUTIONS.md" "docker-compose.yml")
          REQUIRED_HEADINGS=("Pré-requisitos" "Portas e serviços" "Variáveis de ambiente" "Checklist rápido")

          for dir in "${CHALLENGES[@]}"; do
            for file in "${REQUIRED_FILES[@]}"; do
              if [ ! -f "${dir}/${file}" ]; then
                echo "Arquivo obrigatório ausente: ${dir}/${file}"
                exit 1
              fi
            done

            for heading in "${REQUIRED_HEADINGS[@]}"; do
              if ! grep -q "${heading}" "${dir}/QUICKSTART.md"; then
                echo "Heading ausente em ${dir}/QUICKSTART.md: ${heading}"
                exit 1
              fi
            done
          done

          if [ ! -f "solucoes/README.md" ]; then
            echo "Arquivo obrigatório ausente: solucoes/README.md"
            exit 1
          fi

  test-solution:
    name: Validar Solução com Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identificar diretórios modificados
        id: changed-files
        run: |
          # Identifica soluções alteradas em solucoes/<desafio>/<linguagem>
          CHANGED_DIRS=$(git diff --name-only origin/main...HEAD | awk -F/ '$1=="solucoes" && NF>=3 {print $1"/"$2"/"$3}' | sort -u || true)
          echo "Diretórios de solução modificados: $CHANGED_DIRS"

          # Passa o primeiro diretório de solução para a próxima etapa
          FIRST_DIR=$(echo "$CHANGED_DIRS" | head -n 1)
          echo "DIR=$FIRST_DIR" >> $GITHUB_ENV

      - name: Testar Docker Compose da Solução
        if: env.DIR != ''
        run: |
          echo "Testando a solução no diretório: ${{ env.DIR }}"
          if [ -f "${{ env.DIR }}/docker-compose.yml" ]; then
            cd "${{ env.DIR }}"
            echo "Subindo os containers..."
            docker-compose up -d
            
            echo "Aguardando os serviços iniciarem (20s)..."
            sleep 20
            
            echo "Verificando o status dos containers..."
            docker-compose ps
            
            # Executar testes se o script existir
            if [ -f "tests/test_api.sh" ]; then
                echo "Executando testes da API..."
                chmod +x tests/test_api.sh
                ./tests/test_api.sh
            else
                echo "Nenhum script de teste (tests/test_api.sh) encontrado. Pulando etapa de testes."
            fi
            
            echo "Derrubando os containers..."
            docker-compose down
          else
            echo "Nenhum arquivo docker-compose.yml encontrado na solução."
            echo "Por favor, adicione um docker-compose.yml para que a solução possa ser avaliada."
            exit 1
          fi
