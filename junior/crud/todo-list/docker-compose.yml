version: '3.8'

services:
  # Serviço da aplicação To-Do List
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://todo:todo123@db:5432/todo_db
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - todo-network

  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=todo
      - POSTGRES_PASSWORD=todo123
      - POSTGRES_DB=todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  # Adminer para inspecionar o banco (opcional)
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - todo-network

volumes:
  postgres_data:

networks:
  todo-network:

